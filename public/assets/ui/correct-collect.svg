<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle - Green for success -->
  <circle cx="24" cy="24" r="22" fill="rgba(76, 175, 80, 0.2)" stroke="#4caf50" stroke-width="2"/>
  
  <!-- Checkmark symbol -->
  <path d="M 16 24 L 22 30 L 32 18" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Glow effect -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="url(#glowGradient)" stroke-width="1" opacity="0.5"/>
  
  <defs>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#81c784;stop-opacity:0" />
    </linearGradient>
  </defs>
</svg>





