<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle - Red/Orange for error -->
  <circle cx="24" cy="24" r="22" fill="rgba(255, 82, 82, 0.2)" stroke="#ff5252" stroke-width="2"/>
  
  <!-- Target with X - Correct word shot by mistake -->
  <circle cx="24" cy="24" r="10" fill="none" stroke="#ffffff" stroke-width="2"/>
  <circle cx="24" cy="24" r="6" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <!-- X mark -->
  <line x1="18" y1="18" x2="30" y2="30" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="30" y1="18" x2="18" y2="30" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Glow effect -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="url(#glowGradient)" stroke-width="1" opacity="0.5"/>
  
  <defs>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff5252;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8a80;stop-opacity:0" />
    </linearGradient>
  </defs>
</svg>





