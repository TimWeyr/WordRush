<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle - Orange/Yellow for warning -->
  <circle cx="24" cy="24" r="22" fill="rgba(255, 193, 7, 0.2)" stroke="#ffc107" stroke-width="2"/>
  
  <!-- Base/Platform with arrow down - Correct word reached base -->
  <!-- Base platform -->
  <rect x="12" y="30" width="24" height="4" rx="2" fill="#ffffff"/>
  <!-- Arrow pointing down to base -->
  <path d="M 24 14 L 18 22 L 20 22 L 20 26 L 28 26 L 28 22 L 30 22 Z" fill="#ffffff"/>
  <!-- Warning lines on base -->
  <line x1="16" y1="32" x2="20" y2="32" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <line x1="28" y1="32" x2="32" y2="32" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Glow effect -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="url(#glowGradient)" stroke-width="1" opacity="0.5"/>
  
  <defs>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffc107;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd54f;stop-opacity:0" />
    </linearGradient>
  </defs>
</svg>





