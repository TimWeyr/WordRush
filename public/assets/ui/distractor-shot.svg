<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle - Green/Teal for success -->
  <circle cx="24" cy="24" r="22" fill="rgba(0, 200, 83, 0.2)" stroke="#00c853" stroke-width="2"/>
  
  <!-- Target with crosshair - Distractor eliminated -->
  <circle cx="24" cy="24" r="10" fill="none" stroke="#ffffff" stroke-width="2"/>
  <circle cx="24" cy="24" r="6" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <!-- Crosshair inside target -->
  <line x1="24" y1="14" x2="24" y2="18" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="30" x2="24" y2="34" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="14" y1="24" x2="18" y2="24" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="24" x2="34" y2="24" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="24" cy="24" r="1.5" fill="#ffffff"/>
  
  <!-- Glow effect -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="url(#glowGradient)" stroke-width="1" opacity="0.5"/>
  
  <defs>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#69f0ae;stop-opacity:0" />
    </linearGradient>
  </defs>
</svg>

