<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle - Red/Orange for error -->
  <circle cx="24" cy="24" r="22" fill="rgba(255, 152, 0, 0.2)" stroke="#ff9800" stroke-width="2"/>
  
  <!-- Base/Platform with X - Distractor hit base -->
  <!-- Base platform -->
  <rect x="12" y="30" width="24" height="4" rx="2" fill="#ffffff"/>
  <!-- X mark on base -->
  <line x1="18" y1="30" x2="26" y2="34" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="26" y1="30" x2="18" y2="34" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Warning lines on base -->
  <line x1="16" y1="32" x2="20" y2="32" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <line x1="28" y1="32" x2="32" y2="32" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Glow effect -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="url(#glowGradient)" stroke-width="1" opacity="0.5"/>
  
  <defs>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb74d;stop-opacity:0" />
    </linearGradient>
  </defs>
</svg>





