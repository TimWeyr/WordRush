<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle - Red/Orange for error -->
  <circle cx="24" cy="24" r="22" fill="rgba(255, 152, 0, 0.2)" stroke="#ff9800" stroke-width="2"/>
  
  <!-- Explosion/Collision symbol -->
  <!-- Central burst -->
  <circle cx="24" cy="24" r="4" fill="#ffffff"/>
  <!-- Explosion rays -->
  <line x1="24" y1="8" x2="24" y2="16" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="32" x2="24" y2="40" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="8" y1="24" x2="16" y2="24" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="24" x2="40" y2="24" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Diagonal rays -->
  <line x1="13.66" y1="13.66" x2="19.31" y2="19.31" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="34.34" y1="13.66" x2="28.69" y2="19.31" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="13.66" y1="34.34" x2="19.31" y2="28.69" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="34.34" y1="34.34" x2="28.69" y2="28.69" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Glow effect -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="url(#glowGradient)" stroke-width="1" opacity="0.5"/>
  
  <defs>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb74d;stop-opacity:0" />
    </linearGradient>
  </defs>
</svg>





